{% extends "base.html" %}

{% block content %}
<h2>Clue {{ progress }}</h2>

<div class="clue-box">
    {{ clue }}
</div>

<form method="POST">
    <input name="answer" placeholder="Enter Answer">
    <button type="submit">Submit</button>
</form>

<p class="error">{{ message }}</p>

<a href="/leaderboard">Leaderboard</a>
{% endblock %}
