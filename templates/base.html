<!DOCTYPE html>
<html>
<head>
    <title>Treasure Hunt</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 40px auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1, h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        a {
            color: #38bdf8;
            display: block;
            margin-top: 15px;
        }

        .error {
            color: #f87171;
        }

        .clue-box {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .leaderboard li {
            margin: 10px 0;
            padding: 10px;
            background: #334155;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
